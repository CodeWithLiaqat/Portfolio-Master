<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- Base SEO — overridden per-route by useSEO() hook -->
    <title>CODEICS — Cinematic AI-Era Web Studio</title>
    <meta name="description" content="CODEICS builds cinematic, AI-era web experiences for founders and agencies demanding Awwwards-quality craft. WebGL, GSAP, React." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://codeics.com/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="CODEICS" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CODEICS — Cinematic AI-Era Web Studio" />
    <meta property="og:description" content="CODEICS builds cinematic, AI-era web experiences for founders and agencies demanding Awwwards-quality craft." />
    <meta property="og:url" content="https://codeics.com/" />
    <meta property="og:image" content="https://codeics.com/og-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CODEICS — Cinematic AI-Era Web Studio" />
    <meta name="twitter:description" content="CODEICS builds cinematic, AI-era web experiences for founders and agencies." />
    <meta name="twitter:image" content="https://codeics.com/og-default.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Font preconnects — load font origins early -->
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Fonts are loaded via CSS @import in index.css (Clash Display + Satoshi via Fontshare,
      JetBrains Mono via Google Fonts). The preconnects above reduce connection latency
      for those CDN origins. A full woff2 preload would require pinning a specific variant
      URL which changes when Fontshare rotates CDN nodes — preconnect is the stable option.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
